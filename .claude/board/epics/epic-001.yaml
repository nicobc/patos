id: EPIC-001
title: Site skeleton
scope: site
category: infrastructure
status: READY
description: patos.casa DNS configured on Cloudflare, React + Vite app scaffolded in app/, deployed to Cloudflare Pages via CalVer-tagged CI pipeline.
notes:
  - domain is patos.casa — T1 (DNS) is a manual prerequisite and must be DONE before T3 can be verified end-to-end
  - deploy pipeline adapts the nicobc pattern — Wrangler, CalVer tags, workflow_dispatch for branch preview builds
  - Vite output is dist/ (not dist/nicobc/browser as in the Angular predecessor)

tickets:
  - id: T1
    type: chore
    status: READY
    title: Configure patos.casa DNS on Cloudflare
    description: Point patos.casa to the Cloudflare Pages deployment. Manual, no code. Prerequisite for T3 verification.
    acceptance_criteria:
      - patos.casa resolves to the Cloudflare Pages URL
      - HTTPS works on patos.casa
  - id: T2
    type: build
    status: READY
    title: React + Vite app scaffold
    description: Initialise the React + Vite app in app/. Minimal shell — index route, no auth. Must pass npm run build.
    acceptance_criteria:
      - npm run build exits 0 in app/
      - npm run dev serves a page at localhost
      - TypeScript strict mode enabled
      - ESLint configured
      - No default Vite boilerplate remaining
  - id: T3
    type: ci
    status: READY
    title: Cloudflare Pages deploy pipeline
    description: GHA workflow triggered by CalVer tags. Builds the Vite app, deploys via Wrangler to CF Pages project patos, creates a GitHub release. workflow_dispatch enabled for branch preview builds.
    acceptance_criteria:
      - pushing a CalVer tag triggers the workflow and deploys to CF Pages project patos
      - GitHub release created automatically on tag push
      - workflow_dispatch from a feature branch deploys a preview build
      - workflow_dispatch from main or a tag is blocked by the guard step
      - patos.casa serves the deployed app after a tag push

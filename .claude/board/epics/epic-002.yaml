id: EPIC-002
title: Auth
scope: auth
category: infrastructure
status: IN PROGRESS
description: Supabase magic link auth for two users. Sign-in flow, session management, protected routes, and a welcome page that greets the authenticated user by name.
notes:
  - Supabase project creation is a manual prerequisite done via the dashboard — no emails in the repo
  - email allowlist is app-level (not dashboard — Supabase removed that feature): sign-in form checks submitted email against VITE_ALLOWED_EMAILS before calling signInWithOtp; env var keeps emails out of source
  - Cloudflare Access deliberately excluded — RLS + app-level allowlist is sufficient for the threat model (2 users, manual CRUD, no bank API)
  - depends on EPIC-001 — a live CF Pages URL is required to configure Supabase auth redirect URLs
  - T5 (welcome page) is the end-to-end smoke test for the full auth flow

tickets:
  - id: T1
    type: chore
    status: DONE
    title: Create Supabase project and configure auth
    description: Create Supabase project via dashboard. Enable magic link. Manual, no code. Prerequisite for all other tickets in this epic.
    acceptance_criteria:
      - Supabase project exists and is active
      - magic link auth provider enabled
      - redirect URL configured to patos.casa
  - id: T2
    type: feat
    status: DONE
    title: Supabase client config
    description: Add Supabase client singleton and env vars (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_ALLOWED_EMAILS) to the app. .env.local gitignored.
    acceptance_criteria:
      - supabase-js installed
      - client singleton exported from a single module
      - VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY read from env
      - VITE_ALLOWED_EMAILS read from env (comma-separated)
      - .env.local present in .gitignore
  - id: T3
    type: feat
    status: DONE
    title: Magic link sign-in page and auth state
    description: Google OAuth sign-in (both users have Gmail). Auto-redirects to Google on load — no UI shown. Allowlist check in AuthContext post-auth; non-allowlisted accounts are signed out and redirected to Google account picker. Auth state management — session persistence across page loads, sign-out.
    acceptance_criteria:
      - opening the app unauthenticated redirects immediately to Google OAuth
      - session established after Google auth completes
      - non-allowlisted Google account is signed out and Google account picker shown
      - session persists across page reloads
      - sign-out clears the session and triggers Google OAuth again
      - App.test.tsx updated to mock supabase and verify OAuth is triggered
  - id: T4
    type: feat
    status: READY
    title: Protected route wrapper
    description: Unauthenticated users redirected to sign-in. Authenticated users pass through.
    acceptance_criteria:
      - navigating to any protected route without a session redirects to sign-in
      - authenticated users reach the protected route without redirect
      - redirect preserves the intended destination after sign-in
  - id: T5
    type: feat
    status: READY
    title: Welcome page
    description: Landing page post-auth. Reads display name from Supabase session and greets the user by name.
    acceptance_criteria:
      - authenticated user sees a personalised greeting using their display name
      - page is only reachable when authenticated (protected by T4 wrapper)
      - sign-out accessible from the welcome page

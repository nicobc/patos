id: EPIC-004
title: Basic Kanban
scope: kanban
category: feature
status: IN PROGRESS
description: Board UI with project selector, horizontally scrollable columns mapping to task statuses (ideation → planned → ready → in_progress → done), minimal task cards, status transitions via card controls, and a detail modal with full CRUD. Discarded tasks are filtered from the board. Mobile-first.
notes:
  - columns are the five non-discarded status values left to right; discarded tasks are filtered out
  - horizontally scrollable layout — columns are full-height, user swipes left/right on mobile
  - board is always scoped to one project at a time via a project selector
  - I/O isolation enforced: Supabase calls only in src/services/; components never import from lib/supabase.ts
  - task cards show minimal info (title + contractor); full detail in a modal
  - discarded status is reachable only from the detail modal, not from card transition controls

tickets:
  - id: T1
    type: chore
    status: DONE
    title: Service layer
    description: Create src/services/projectsService.ts, src/services/tasksService.ts, and src/services/contractorsService.ts with typed functions wrapping Supabase calls. No UI changes. Establishes the I/O isolation pattern — all subsequent tickets import from these modules; no component or hook touches lib/supabase.ts directly.
    acceptance_criteria:
      - projectsService exports listProjects() returning typed Project[]
      - tasksService exports listTasksByProject(projectId), createTask(data), updateTask(id, data), deleteTask(id) with types derived from database.ts
      - contractorsService exports listContractors() returning typed Contractor[]
      - tasksService exports subscribeToTaskChanges(projectId, callback) returning an unsubscribe function; callback receives the changed row and event type (INSERT, UPDATE, DELETE)
      - no Supabase imports outside of src/services/ and src/lib/supabase.ts
      - unit tests cover each service function with a mocked Supabase client

  - id: T2
    type: feat
    status: DONE
    title: Board shell and project selector
    description: Implement the Board page — a project selector at the top and five horizontally scrollable columns (ideation, planned, ready, in_progress, done) with empty states per column. No task rendering yet. Reads projects from projectsService.
    acceptance_criteria:
      - project selector renders all projects fetched via projectsService; selecting one updates board scope in local state
      - five columns rendered left to right in status enum order with a human-readable header each
      - layout is horizontally scrollable on mobile; columns are full-height
      - each column shows an empty state when it has no tasks
      - loading and error states handled for the projects fetch

  - id: T3
    type: feat
    status: DONE
    title: Task cards
    description: Fetch tasks for the selected project via tasksService, group by status, and render minimal cards in their respective columns. Clicking a card opens the detail modal (wired in T4). Discarded tasks are excluded.
    acceptance_criteria:
      - tasks fetched via listTasksByProject on initial project selection, then kept live via subscribeToTaskChanges for the selected project
      - INSERT events add the new card to the correct column; UPDATE events move or refresh the card; DELETE events remove it — no full refetch needed
      - tasks with status 'discarded' are excluded from all columns (including real-time events)
      - each card displays the task title and contractor name (or an unassigned indicator if contractor_id is null)
      - clicking a card triggers an onSelect callback (stubbed until T4 is merged)
      - loading and error states handled for the tasks fetch

  - id: T4
    type: feat
    status: DONE
    title: Task detail view
    description: Inline detail view that replaces the board when a task card is clicked. Displays all task fields read-only. Includes a discard action (sets status to discarded) and a delete action (removes the row). Wires up the onSelect callback from T3. Entry point for the edit flow in T6.
    acceptance_criteria:
      - detail view renders title, description, contractor, expected_cost, actual_cost, expected_duration_days, actual_start, actual_end, status, and created_at
      - discard action calls tasksService.updateTask with status 'discarded'; navigates back to board on success
      - delete action calls tasksService.deleteTask; navigates back to board on success
      - both destructive actions require an explicit confirmation step before executing
      - back button returns to the board without performing any action
      - edit button is present (wired to no-op until T6 is merged)

  - id: T5
    type: feat
    status: DONE
    title: Status transitions
    description: Add prev/next status controls to each task card so the user can move a task to an adjacent non-discarded status without opening the detail modal. Optimistic update with rollback on error.
    acceptance_criteria:
      - each card shows a prev and next control; prev is disabled on ideation, next is disabled on done
      - tapping a control calls tasksService.updateTask and moves the card to the correct column immediately (optimistic)
      - on error the card reverts to its original column and an error state is shown
      - discarded is never offered as a transition target from these controls
      - transitioning to in_progress sets actual_start to today if not already set
      - transitioning to done sets actual_end to today if not already set

  - id: T6
    type: feat
    status: DONE
    title: Task create and edit
    description: Shared modal form for creating a new task (+ button on the board) and editing an existing task (edit button in the detail modal). On create, project_id is set from the selected project and owner_id from the auth context.
    acceptance_criteria:
      - form fields: title (required), description, contractor (select populated from contractorsService), expected_cost, expected_duration_days, actual_start, actual_end
      - edit pre-fills all fields from the existing task
      - create calls tasksService.createTask; new card appears in the ideation column on success
      - edit calls tasksService.updateTask; updated card reflects changes immediately
      - title is required; cost and duration accept numbers only; dates are valid
      - unsaved changes prompt for confirmation before the modal closes
      - uses .input, .btn-primary, .btn-ghost from the design system
      - status is a closed dropdown — only the existing status enum values are selectable; no free-text input
      - contractor is a closed dropdown — only existing contractors from contractorsService are selectable; no free-text input
      - dropdown controls use the same visual style as the account menu dropdown (bg, border-faint, border-radius treatment); extract the reusable parts from UserMenu.css into a .dropdown utility class in index.css before implementing
      - actual_start may be cleared only when task status is ideation, planned, or ready; at in_progress or done the field is required and the form must prevent clearing it
      - actual_end may be cleared only when task status is not done; at done the field is required and the form must prevent clearing it

  - id: T7
    type: feat
    status: READY
    title: Board UI/UX polish
    description: Final polish pass across the entire kanban surface — branding, layout, real-time completeness, and visual consistency.
    acceptance_criteria:
      - app/public/logo.svg is already in place; AppShell replaces the "The Patos Project" text with <img src="/logo.svg">; index.html <link rel="icon"> updated to /logo.svg — one asset, two uses
      - board columns scroll vertically independently (overflow-y auto); cards have a fixed width and do not compress or stretch to fit the column
      - contractorsService gains subscribeToContractorChanges(callback) returning an unsubscribe function, following the exact same pattern as subscribeToProjectChanges; Board and Settings each wire it up in their useEffect alongside existing subscriptions so contractor state stays live without a full refetch; unit test covers INSERT, UPDATE, DELETE events and the unsubscribe call
      - a .btn base class added to index.css sets shared dimensions (height, padding, font-size, border-radius); btn-primary, btn-ghost, btn-outline, and btn-danger extend .btn and override only color and border; btn-icon remains its own class; all buttons in the same toolbar or action row are visually the same size as a result
      - all dropdowns (board project selector, TaskForm status and contractor selects, any others) consistently apply the .dropdown utility class for visual treatment
      - currency symbol changed from $ to € everywhere it appears in the UI

  - id: T8
    type: feat
    status: DONE
    title: Add status 'on hold'
    description: Introduce 'on_hold' as a status value reachable only from in_progress. on_hold tasks render in the in_progress column — no new board column. A stop-sign icon button on each in_progress/on_hold card toggles the hold state. All on_hold transitions are recorded by the existing trigger, enabling future KPI computation (e.g. cost per active day).
    acceptance_criteria:
      - migration adds 'on_hold' to the check constraint on tasks.status and task_status_history.status; no other schema changes needed — the existing trigger records on_hold transitions automatically
      - on_hold tasks render in the in_progress board column alongside in_progress tasks; no new column is added
      - task cards with status in_progress or on_hold show a stop-sign FontAwesome icon button in the top-right corner
      - icon color uses a fg design-system token at reduced opacity when status is in_progress; uses the accent color token when status is on_hold
      - clicking the icon when status is in_progress calls tasksService.updateTask with status 'on_hold'; clicking when on_hold transitions back to in_progress; both use optimistic update with rollback on error
      - prev/next transition controls are disabled while status is on_hold
      - on_hold ↔ in_progress transitions do not modify actual_start or actual_end
      - on_hold is not reachable from any status other than in_progress and is not offered via prev/next controls or any other transition path
      - the edit form status dropdown includes on_hold; it is only selectable when the task's current status is in_progress or on_hold

  - id: T9
    type: feat
    status: DONE
    title: Manage contractors
    description: Settings surface entry point (gear icon in board toolbar) and contractor CRUD. The gear icon navigates to an inline settings page; the Contractors section is the only content until T11 ships. Manage projects is added in T11.
    acceptance_criteria:
      - gear icon button added to the board toolbar (right side of the toolbar row); navigates to an inline settings page with a ← Board back button
      - settings page renders a Contractors section listing all contractors (name, email, phone) fetched via contractorsService.listContractors
      - each contractor row has Edit and Delete buttons
      - Edit navigates to an inline contractor form (← Settings back) with name (required), email, phone pre-filled; save calls contractorsService.updateContractor and returns to the settings page
      - Add contractor button opens the same form empty; save calls contractorsService.createContractor and returns to the settings page
      - Delete: calls contractorsService.countTasksByContractor first; if count > 0 shows a block message ("N tasks are assigned to this contractor — reassign them before deleting") with no destructive action available; if count is 0 shows a soft confirmation before calling contractorsService.deleteContractor
      - contractorsService gains createContractor(data), updateContractor(id, data), deleteContractor(id), countTasksByContractor(id) with typed signatures derived from database.ts
      - unit tests cover all four new service functions

  - id: T10
    type: feat
    status: DONE
    title: Task dependencies
    description: Allow tasks to declare which other tasks they are blocked by. The edit form gains a "Blocked by" multi-select (writable) scoped to the current project's tasks. TaskDetail gains a read-only "Blocks" field showing tasks that depend on this one. Backed by the existing task_deps table.
    acceptance_criteria:
      - migration drops 'ready' from the check constraint on tasks.status and task_status_history.status; seed.sql updated to replace all 'ready' values with 'planned'
      - the board removes the ready column entirely; the five visible columns become ideation, planned, in_progress (includes on_hold tasks), done — four columns total; all board logic, transition maps, and column ordering updated accordingly
      - tasksService gains listBlockers(taskId) returning Task[] (tasks this task depends on), listBlocks(taskId) returning Task[] (tasks that depend on this task), and setBlockers(taskId, blockerIds[]) replacing the full blocker set atomically; all three have typed signatures derived from database.ts
      - unit tests cover listBlockers, listBlocks, and setBlockers with a mocked Supabase client
      - the edit form gains a "Blocked by" closed multi-select populated from all tasks in the current project except the task being edited; options are grouped into two sections — active statuses (ideation, planned, in_progress, on_hold) and a visually separated completed section (done, discarded); currently selected blockers are pre-checked on open
      - saving the edit form calls setBlockers with the selected ids; an empty selection calls setBlockers with an empty array (removes all blockers)
      - TaskDetail gains a read-only "Blocks" section listing tasks that depend on this task (titles only), fetched via listBlocks; section is omitted when the list is empty
      - board cards with at least one blocker not in done status show a lock icon (FontAwesome); the lock icon and the on_hold stop-sign icon share identical size, padding, and positioning treatment — they form a consistent icon family in the card
      - transitioning a task to in_progress via the card prev/next controls when it has at least one blocker not in done shows an inline warning naming the unresolved blockers, with a confirm CTA to proceed and a cancel CTA to abort; confirming executes the transition normally
      - transitioning a task to in_progress via the edit form status dropdown under the same condition shows the same warning + confirm/cancel before the save completes; cancelling leaves the form open with the previous status restored
      - the edit form status dropdown removes 'ready' as a selectable option
      - tasksService gains subscribeToDepsChanges(projectId, callback) returning an unsubscribe function; it subscribes to INSERT and DELETE events on task_deps, filters client-side to rows whose task_id belongs to the current project's tasks, and invokes the callback with the affected task_id and event type so the board can refresh blocker state for that card without a full refetch; unit test covers the subscription with a mocked Supabase client

  - id: T11
    type: feat
    status: DONE
    title: Manage projects
    description: Projects section added to the existing settings page (above Contractors). Full CRUD with a two-tier delete confirmation — soft confirmation when the project has no tasks, hard confirmation (must type "delete") when tasks exist. Migration changes tasks.project_id to ON DELETE CASCADE so a confirmed hard delete removes all tasks atomically via the DB.
    acceptance_criteria:
      - migration alters the tasks.project_id FK from NO ACTION to ON DELETE CASCADE
      - settings page gains a Projects section above the Contractors section, listing all projects (name, description) fetched via projectsService.listProjects
      - each project row has Edit and Delete buttons
      - Edit navigates to an inline project form (← Settings back) with name (required) and description pre-filled; save calls projectsService.updateProject and returns to the settings page
      - Add project button opens the same form empty; save calls projectsService.createProject and returns to the settings page
      - Delete: calls projectsService.countTasksByProject first; if count is 0 shows a soft confirmation ("Delete project?") before calling projectsService.deleteProject; if count > 0 shows a hard confirmation warning that all tasks will be permanently deleted and requires the user to type "delete" before the confirm button is enabled
      - on successful project deletion the board reloads the project list; if the deleted project was selected the board clears to an empty/unselected state
      - projectsService gains createProject(data), updateProject(id, data), deleteProject(id), countTasksByProject(id) with typed signatures derived from database.ts
      - unit tests cover all four new service functions

id: EPIC-010
title: UI/UX improvements
scope: ui-ux
category: polish
status: DONE
description: First-pass polish after the MVP. Covers mobile correctness, interaction quality, toast feedback, the broken details multi-select, search, undo for accidental status changes, brand application, and DAG navigability. No new data model changes — purely presentation and interaction improvements.
notes:
  - T3 (toast) must ship before or together with T4 (undo) since undo is delivered via a toast action
  - T9 (DAG pan/zoom) is also the right moment to introduce React.lazy on DagView — bundle split comes for free
  - T12 (planning grid) restructures TaskForm/TaskDetail layout; T10 (mobile pass) must follow T12 so it catches regressions on the final form structure
  - T7 and T8 are blocked on owner providing the new logo.svg file and the icon selection list

tickets:
  - id: T1
    type: fix
    status: DONE
    title: Fix iOS auto-zoom on input focus
    description: iOS Safari auto-zooms when a focused input has font-size < 16px. All .input elements use --fs-sm (0.875rem = 14px), triggering zoom on every tap on mobile. Fix with a targeted media query at the standard 768px mobile breakpoint — no changes to design tokens or desktop sizing. Do NOT modify the viewport meta tag with maximum-scale or user-scalable, which breaks intentional zoom and violates accessibility guidelines.
    acceptance_criteria:
      - index.css adds @media (width <= 768px) { .input { font-size: 1rem; } } (1rem = 16px, the iOS Safari threshold)
      - tapping any form input in TaskForm, Settings, and the board search field (T6) no longer triggers auto-zoom on a mobile viewport
      - desktop sizing and all token values are unchanged
      - viewport <meta> tag is NOT modified

  - id: T2
    type: feat
    status: DONE
    title: Consistent custom popovers for Contractor, Status, Blocked by; design-system select primitives
    description: Contractor, Status, and Blocked by all had inconsistent form-control styling. Blocked by used a semantically wrong <details> element; Contractor and Status used native <select> elements with .dropdown applied incorrectly. This ticket replaces all three with a unified custom popover system and introduces .select / .select-wrap / .select-chevron design-system primitives. .dropdown is retained as a panel-only class. The UserMenu dropdown is also updated to the same panel border treatment and flush positioning.
    notes:
      - UserMenu trigger has no left border — the panel is wider than the trigger name so a left border on the trigger cannot align with the panel's left border
      - Board project picker retains its native <select> wrapped in .select-wrap (standalone toolbar control, not a form popover)
    acceptance_criteria:
      - .select (surface treatment), .select-chevron (icon sizing + transition), and .select-wrap (native select wrapper with appearance:none and positioned chevron) added to index.css; no component styles added to index.css
      - Contractor and Status replaced with custom popovers; native <select> elements and .select-wrap wrappers removed from TaskForm
      - <details> and <summary> fully removed from the codebase
      - a single useEffect handles outside-mousedown and Escape for all three popovers simultaneously; Escape returns focus to the respective trigger button
      - all trigger buttons use .input and .select classes; FA faChevronDown chevron with 180° open/close CSS transition via --transition-fast
      - Contractor and Status: single-select — clicking an option sets the value and closes the panel; FA faCheck visible on the selected option, invisible (opacity 0) on others to keep text alignment stable
      - Blocked by: multi-select — clicking toggles selection; FA faCheck visible on selected options; active/completed grouping, dirty tracking, and blocker-warning flow unchanged
      - panels open flush below their trigger: no gap, trigger bottom radius 0 and bottom border transparent when open, panel border-top none and top radius 0
      - UserMenu dropdown: position absolute relative to .user-menu container (was fixed); border uses var(--border); flush connection via transparent trigger bottom border when open; min-width max-content prevents wrapping

  - id: T3
    type: feat
    status: DONE
    title: Toast notifications after mutations
    description: All successful mutations return silently to the previous view with no feedback. Add a lightweight toast system so users know their action succeeded. Toasts are success-only — error states remain inline and are not duplicated here. ToastProvider wraps Board in App.tsx so useToast() is available to all subtree components including Settings, TaskForm, and TaskDetail. Also fixes a pre-existing double-entry bug in Settings where manual state updates and Supabase realtime subscriptions both fired on INSERT — manual updates removed from save handlers, subscriptions are now the sole state updater.
    acceptance_criteria:
      - a useToast() hook exposes showToast(message string, options? { action?: { label string; onAction () => void } }) and is accessible anywhere within the Board subtree
      - toasts render as fixed-position pills at top-center of the screen, just below the app header (top calc(--nav-height + 12px)), at a z-index above all other content; top placement chosen over bottom because mutations navigate away and the user's gaze lands at the top of the incoming view
      - each toast auto-dismisses after 2.5 seconds; a new toast replaces the current one immediately
      - at most one toast is visible at a time
      - toasts animate in (slide down + fade) and out (fade) using CSS transitions with --transition and --transition-fast tokens
      - toast pill is success-styled: --surface background, faCheck icon in --success color, border using color-mix(--success at --opacity-subtle); width fit-content so the pill is compact and text-proportional
      - success messages triggered on each mutation — "Task created", "Task saved", "Task archived", "Task deleted", "Contractor created", "Contractor saved", "Contractor deleted", "Project created", "Project saved", "Project deleted"
      - the optional action renders as a button inside the toast pill (used by T4 for undo)

  - id: T4
    type: feat
    status: DONE
    title: Undo status transitions and offer stale-date update via card arrow toast
    description: The < > status arrows on board cards are instant with no recovery path, and they silently leave stale dates when actual_start or actual_end are already set to a past value. Unify both concerns into a single post-action toast on every card arrow press — the toast covers undo (full rollback) and, when a stale date is detected, an inline "Update" shortcut to set it to today. A blocking pre-flight prompt is intentionally avoided to keep the board interaction fast and non-blocking. Applies only to the card arrows, not to other status change surfaces.
    acceptance_criteria:
      - requires T3
      - the showToast API is extended to support an optional secondary action: showToast(message, options? { action?: { label, onAction }, secondaryAction?: { label, onAction } }); existing single-action call sites are unchanged
      - when < > is clicked, the full pre-transition task state { status, actual_start, actual_end } is captured before the optimistic update
      - Case A — no stale date: showToast("Moved to [Status Label].", { action: { label: "Undo", onAction } }); Undo calls updateTask(task.id, preTransitionState) and applies the reverse optimistic update
      - Case B — stale actual_start when transitioning to in_progress, or stale actual_end when transitioning to done: showToast("Moved to [Status Label].", { action: { label: "Update [start|end]", onAction: updateToToday }, secondaryAction: { label: "Undo", onAction: rollback } }); Update calls updateTask with the relevant date field set to today; Undo calls updateTask(task.id, preTransitionState) and reverses the optimistic update
      - "stale" means the relevant date field is non-null and not equal to today's date; when the field is null the existing auto-set behaviour is preserved and no date action appears in the toast
      - if both actual_start and actual_end are stale simultaneously (e.g. skipping directly to done), surface only the more relevant date field (actual_end for done transitions, actual_start for in_progress); document the choice in the PR
      - all card arrow toasts use a 7-second duration, overriding the default; undo and date-update actions expire silently if not clicked before dismissal
      - the blocker-warning confirm flow (already present when moving a blocked task to in_progress) is unchanged — the post-action toast appears after any blocker confirmation
      - transitions triggered via the edit form are not affected — the user has explicit control over date fields there

  - id: T5
    type: feat
    status: DONE
    title: Discarded task visibility and recovery
    description: Discarded tasks vanish from the board with no visibility and no recovery path. This ticket gives them a home — an opt-in board column surfaced via a toolbar toggle — and adds a Restore action in TaskDetail that returns a discarded task to ideation for re-grooming. The Discard/Delete semantic distinction is preserved and unchanged; this ticket is purely additive. Discard means cancelled/abandoned (soft, recoverable via this ticket); Delete means permanently gone (hard, irreversible).
    acceptance_criteria:
      - board toolbar gains a "Show discarded" toggle; visible only when view.kind === 'board' and a project is selected; off by default on mount and reset to off whenever the selected project changes
      - when toggled on, a "Discarded" column renders as the rightmost board column; toggling off removes it
      - discarded cards use a muted visual treatment (reduced opacity) to signal they are outside the active task lifecycle
      - clicking a discarded card opens TaskDetail as normal
      - TaskDetail renders a "Restore" button in place of "Discard" when the viewed task has status discarded; clicking Restore sets status to ideation with an optimistic update and shows a "Task restored" toast (using the existing toast system from T3)
      - on restore the task disappears from the Discarded column and reappears in the Ideation column; if the Discarded column is now empty it shows the standard column empty-state
      - "Delete" button in TaskDetail is unchanged for discarded tasks — hard delete remains available
      - "Discard" button, its label, confirmation prompt, and behaviour are unchanged for all non-discarded tasks
      - STATUS_LABELS and all other status display strings are unchanged — discarded is not renamed
      - no data model changes required

  - id: T6
    type: feat
    status: DONE
    title: Board search and filter
    description: With many tasks across columns, finding a specific task requires scrolling. Add a filter input to the board toolbar that narrows visible cards by title substring and contractor name simultaneously. No server round-trips — filtering is local over the already-loaded tasks array.
    acceptance_criteria:
      - a text input with placeholder "Search tasks…" appears in the board toolbar below the tabs row; visible only when view.kind === 'board' and a project is selected
      - filter logic — a task passes if title contains the query (case-insensitive) OR contractor name contains the query (case-insensitive) using the contractorName lookup already present in Board
      - empty columns render their "No tasks" empty state; columns with matching tasks show only matching cards
      - a clear button (×) appears inside the input when the query is non-empty; clicking it resets the filter and returns focus to the input
      - filter resets to empty string when selectedId changes
      - the input uses the .input class; does not auto-focus on mount (requires T1 to be safe on iOS)

  - id: T7
    type: chore
    status: DONE
    title: Logo integration
    description: A reworked logo.svg containing the brand name has been prepared by the owner outside the repo. Integrate it as the primary app logo and favicon.
    acceptance_criteria:
      - app/public/logo.svg replaced with the new file provided by the owner
      - index.html <link rel="icon"> points to /logo.svg
      - AppShell renders <img src="/logo.svg" alt="Patos" /> in the nav at the existing nav-height; any remaining text label removed
      - logo renders correctly at nav bar dimensions in both light and dark themes
      - no additional icon or font assets added

  - id: T8
    type: chore
    status: DONE
    title: Replace card nav text glyphs with FA angle icons; align hold toggle in controls row
    description: The card nav buttons used ‹ › typographic characters — inconsistent rendering across platforms, not subject to FA sizing and color tokens. Replace with faAngleLeft / faAngleRight from free-solid-svg-icons. Also moves the hold toggle (pause/play) from the absolute-positioned overlay into the controls row, centering it between the nav icons on the same baseline. The blocked lock indicator stays absolute in the card body corner as a passive signal, with its right offset adjusted to align visually with the > button.
    acceptance_criteria:
      - faAngleLeft and faAngleRight from @fortawesome/free-solid-svg-icons replace the ‹ › text characters in .task-card-nav buttons
      - hold toggle (pause/play button) moves from .task-card-icons absolute overlay into .task-card-controls, centered between the two nav buttons on the same baseline
      - lock icon remains in .task-card-icons (position absolute, top-right of card) as a passive blocked indicator; right offset set to 0.625rem to align with the > button
      - no new icon packages added; all icons from existing @fortawesome/free-solid-svg-icons
      - all interactive icons retain meaningful aria-label attributes on their parent buttons

  - id: T9
    type: feat
    status: DONE
    title: DAG pan/zoom with lazy-loaded DagView
    description: The DAG SVG is fixed-size from dagre's layout output. With a large graph it overflows or becomes too small to read with no way to navigate. Add pan/zoom via react-zoom-pan-pinch. This is also the right moment to lazy-load DagView — dagre and the zoom library are split into a separate chunk that is only fetched when the Dependencies tab is first opened.
    acceptance_criteria:
      - react-zoom-pan-pinch added as a dependency
      - the SVG content inside DagView is wrapped in <TransformWrapper><TransformComponent>; pan via drag, zoom via pinch (mobile) and scroll wheel (desktop)
      - initial scale fits the graph to the available container width; minimum scale prevents content from shrinking below the container; maximum scale capped at 3×
      - double-tap on mobile resets to the initial fit-to-width scale
      - the cycle warning header and standalone count footer remain outside <TransformWrapper> so they do not pan or zoom with the graph
      - Board.tsx loads DagView via React.lazy(() => import('./DagView')) wrapped in <Suspense fallback={<p className="board-message dag-placeholder">Loading…</p>}>
      - tapping a node navigates to task detail correctly — verify that click events on <foreignObject> buttons are not captured by the pan handler on both desktop and mobile

  - id: T10
    type: feat
    status: DONE
    title: Mobile layout and spacing pass
    description: Final pass to ensure the app is usable on mobile viewports (≤ 768px). Consolidates spacing, padding, and alignment decisions across all views after all other tickets in this epic have landed. Includes adaptive theming and UX polish accumulated during the pass.
    acceptance_criteria:
      - board toolbar, tabs row, and task cards have no horizontal overflow at mobile viewport widths (≤ 768px)
      - TaskForm, TaskDetail, and Settings forms have comfortable tap targets (minimum 44px height for interactive elements) at mobile viewport widths
      - board columns horizontal scroll does not trigger simultaneous body scroll (touch-action isolation applied)
      - all text is readable without zoom at default mobile font size
      - no fixed pixel values introduced for spacing — all sizing uses existing design tokens or rem units
      - adaptive theme follows prefers-color-scheme by default (dark fallback); explicit override persisted to localStorage; Settings exposes Auto / Light / Dark segmented toggle with faMobileScreen / faSun / faMoon icons; inline script in index.html prevents flash of wrong theme on load
      - empty date inputs render template values at --opacity-subtle via color-mix so they are visually muted but visible; cost inputs show — placeholder at the same opacity tier
      - TaskDetail Discard / Delete action row uses justify-content space-between to spatially signal their semantic difference
      - bottom nav removed; AppShell simplified to desktop sidebar only; .page-header and .page-title extracted as shared design-system primitives used by TaskForm, TaskDetail, and Settings

  - id: T11
    type: feat
    status: DONE
    title: Replace expected_duration with expected_start / expected_end
    description: expected_duration is unplannable without an anchor date and the current UX is broken — users have been setting expected dates in the actual_start field. Replace with expected_start and expected_end date fields, mirroring the actual_start / actual_end pair already on the task. These are planning-only fields; they do not affect the dependency graph or blocking logic (which remains driven by task_deps). They will feed the Gantt chart in EPIC-007.
    acceptance_criteria:
      - migration drops expected_duration from the tasks table and adds expected_start (date, nullable) and expected_end (date, nullable)
      - TypeScript types and all service call sites updated to remove expected_duration and include expected_start / expected_end
      - TaskForm replaces the expected_duration input with expected_start and expected_end date inputs, styled and validated identically to the existing actual_start / actual_end fields
      - TaskDetail displays expected_start and expected_end alongside actual_start and actual_end; layout groups them as expected/actual pairs (e.g. expected start + actual start on one row, expected end + actual end on the next) or as a dedicated expected row and actual row — decide at implementation
      - no changes to DAG, task_deps, or blocking/blocker logic

  - id: T12
    type: feat
    status: DONE
    title: Redesign planning fields as expected/actual grid with K€ formatting
    description: The planning fields in TaskForm and TaskDetail (expected_cost, actual_cost, expected_start, expected_end, actual_start, actual_end) are listed as six separate rows with inconsistent labels. Replace with a 2-column Option-A grid — each cell has a muted label above its value/input — giving a clean expected-vs-actual comparison without a dedicated row-label column. Both views share the same visual pattern. Also unifies field order across form and detail, and makes select triggers match text input background. No data model changes.
    acceptance_criteria:
      - no DB or TypeScript type changes; all six field names unchanged
      - formatCost(value number | null) utility added in src/lib/formatters.ts — "X.YK€" when ≥ 1000, "€X" otherwise, "—" when null
      - formatDate(value string | null) utility added — "MMM D" format, "—" when null; avoids timezone shift by constructing Date from parsed parts
      - TaskForm replaces six separate field rows with a 2-column planning grid (.planning-form-grid); each cell is a <label class="task-form-label"> with label text above the input; cost labels include "(€)"; number inputs have spinner arrows removed via CSS
      - TaskForm field order: title, description, status, contractor, blocked by, planning grid
      - TaskDetail drops the dl layout entirely; all fields rendered as uniform .task-detail-cell (label above value); planning fields use a nested .planning-detail-grid (2-column)
      - TaskDetail field order: description, status, contractor, blocked by, blocks, planning grid, created
      - select/multiselect triggers use the same background as .input (var(--surface-faint)) — background and border-color overrides removed from .select
      - planning grid inputs constrained to their column via min-width: 0 on container and input

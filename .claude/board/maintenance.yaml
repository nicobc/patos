tickets:
  - id: T1
    type: fix
    scope: deploy
    status: DONE
    title: Pass VITE_ env vars to GitHub Actions build
    description: Build runs on GitHub Actions, not CF Pages — VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, and VITE_ALLOWED_EMAILS must be GitHub secrets threaded into the Build step. CF Pages env vars are never seen by this pipeline. Dev/prod separation is natural — .env.local holds dev values for local builds; GitHub secrets hold prod values for tag-triggered CI builds.
    acceptance_criteria:
      - six GitHub Actions secrets: VITE_SUPABASE_URL_PRD/DEV, VITE_SUPABASE_ANON_KEY_PRD/DEV, VITE_ALLOWED_EMAILS_PRD/DEV
      - Build step in deploy-app.yml selects PRD set on tag push, DEV set otherwise
      - production deploy (tag) bakes prod values; preview deploy (dispatch) bakes dev values
      - dev Supabase project allows CF Pages preview redirect URL (*.patos.pages.dev)

  - id: T2
    type: ci
    scope: supabase
    status: DONE
    title: GHA workflow for DB migrations with env selector
    description: |
      workflow_dispatch workflow that links to the selected Supabase project and pushes
      pending migrations. Environment input (dev | prd) selects the project ref via
      SUPABASE_PROJECT_ID_PRD / SUPABASE_PROJECT_ID_DEV secrets. Auth via
      SUPABASE_ACCESS_TOKEN. Replaces the manual `npm run db:push` step that was
      previously run from a developer's laptop.
    acceptance_criteria:
      - .github/workflows/migrate-db.yml triggers on workflow_dispatch with environment input (dev | prd)
      - dispatching with dev targets the dev project; prd targets the prod project
      - workflow installs supabase CLI via supabase/setup-cli@v1 and authenticates via SUPABASE_ACCESS_TOKEN
      - dispatching against a project with no pending migrations completes successfully (no-op is not an error)
      - dispatching against a project with pending migrations applies them cleanly

  - id: T3
    type: ci
    scope: supabase
    status: DONE
    title: CI workflow cleanup and migrate-db seed support
    description: |
      Broad CI cleanup pass across all three workflows plus the release script.
      migrate-db: tag push auto-migrates prd (consistent with deploy-app); manual dispatch is dev-only with an optional seed boolean that triggers supabase db reset --linked instead of db push.
      deploy-app: single job split into validate→build→deploy with dist artifact passed between jobs.
      test-app: build-and-lint job renamed to test (reflects that build + lint + test all run).
      scripts/create-release-tag.sh: renamed from tag-release.sh for clarity.
      seed.sql: redundant truncate removed (db reset always starts clean).
    acceptance_criteria:
      - migrate-db tag push triggers migrate job against prd automatically
      - migrate-db workflow_dispatch targets dev only; environment input removed
      - migrate-db seed=false dispatch runs supabase db push --linked (migrate job)
      - migrate-db seed=true dispatch runs supabase db reset --linked against dev, pipes y to skip confirmation (reset job)
      - migrate and reset jobs are mutually exclusive
      - deploy-app splits into validate→build→deploy; dist artifact uploaded by build and downloaded by deploy
      - test-app job renamed from build-and-lint to test
      - scripts/tag-release.sh renamed to scripts/create-release-tag.sh
      - truncate statement removed from seed.sql

  - id: T4
    type: ci
    scope: deploy
    status: DONE
    title: Allow workflow_dispatch from main for dev preview builds
    description: Relax the dispatch guard in deploy-app.yml so main can be dispatched. A dispatch from main deploys to the CF Pages 'dev' branch (preview URL) with DEV secrets — never to the production 'main' branch. Tag pushes continue to deploy to CF Pages 'main' (production) with PRD secrets.
    acceptance_criteria:
      - workflow_dispatch from main no longer errors; from a tag still errors
      - dispatch from main deploys to CF Pages branch 'dev' with DEV secrets
      - dispatch from a feature branch deploys to that branch name (unchanged)
      - tag push deploys to CF Pages branch 'main' with PRD secrets (unchanged)

  - id: T5
    type: fix
    scope: realtime
    status: IN PROGRESS
    title: REPLICA IDENTITY FULL on all RLS-enabled tables
    description: Supabase realtime silently drops DELETE events on RLS-enabled tables without REPLICA IDENTITY FULL. With the default setting, payload.old only contains PK columns; the realtime server cannot evaluate row-level policies and drops the event. Confirmed impact on task_deps (dep removals not reflected in DAG/blocked-badge without reload) and tasks (project_id filter on DELETE events can't be evaluated). Fix applies REPLICA IDENTITY FULL to all six RLS-enabled tables so all current and future subscriptions work correctly.
    acceptance_criteria:
      - migration sets REPLICA IDENTITY FULL on projects, spaces, contractors, tasks, task_spaces, task_deps
      - editing a task's blockers via TaskForm immediately updates the DAG view and Kanban blocked badge without a page reload

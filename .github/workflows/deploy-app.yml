name: Deploy

on:
  push:
    tags:
      - 'v20[2-9][0-9].0[1-9].[0-9]*'
      - 'v20[2-9][0-9].1[0-2].[0-9]*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — disallow dispatch from a tag
        if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/')
        run: echo "Dispatch from a tag is forbidden. Use a feature branch or main for dev preview builds, or push a new CalVer tag for production." && exit 1

  build:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Build
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ github.ref_type == 'tag' && secrets.VITE_SUPABASE_URL_PRD || secrets.VITE_SUPABASE_URL_DEV }}
          VITE_SUPABASE_ANON_KEY: ${{ github.ref_type == 'tag' && secrets.VITE_SUPABASE_ANON_KEY_PRD || secrets.VITE_SUPABASE_ANON_KEY_DEV }}
          VITE_ALLOWED_EMAILS: ${{ github.ref_type == 'tag' && secrets.VITE_ALLOWED_EMAILS_PRD || secrets.VITE_ALLOWED_EMAILS_DEV }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: app/dist
      - name: Deploy to Cloudflare Pages
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then BRANCH=main
          elif [ "${{ github.ref_name }}" = "main" ]; then BRANCH=dev
          else BRANCH="${{ github.ref_name }}"
          fi
          npx wrangler pages deploy app/dist --project-name=patos --branch="$BRANCH"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Create GitHub release
        if: github.event_name == 'push'
        run: gh release create ${{ github.ref_name }} --repo ${{ github.repository }} --generate-notes --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

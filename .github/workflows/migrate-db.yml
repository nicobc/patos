name: DB Migrate

on:
  push:
    tags:
      - 'v20[2-9][0-9].0[1-9].[0-9]*'
      - 'v20[2-9][0-9].1[0-2].[0-9]*'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Reset and re-seed dev database'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    if: ${{ !inputs.seed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref_type == 'tag' && secrets.SUPABASE_PROJECT_ID_PRD || secrets.SUPABASE_PROJECT_ID_DEV }}

  reset:
    if: ${{ inputs.seed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Reset and seed
        run: |
          supabase link --project-ref "$PROJECT_REF"
          echo y | supabase db reset --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID_DEV }}

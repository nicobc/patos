name: DB Migrate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prd
      seed:
        description: 'Reset and re-seed database (dev only)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — reset is dev-only
        if: ${{ inputs.seed && inputs.environment != 'dev' }}
        run: |
          echo "::error::seed=true is only permitted for the dev environment (got: ${{ inputs.environment }})"
          exit 1

  migrate:
    needs: validate
    if: ${{ !inputs.seed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.environment == 'prd' && secrets.SUPABASE_PROJECT_ID_PRD || secrets.SUPABASE_PROJECT_ID_DEV }}

  reset:
    needs: validate
    if: ${{ inputs.seed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Reset and seed
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db reset --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID_DEV }}

name: Migration Check

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            migrations:
              - 'supabase/migrations/**'
              - 'app/src/types/database.ts'

  check:
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset
      - run: |
          supabase gen types --local > /tmp/database.ts
          if ! diff /tmp/database.ts app/src/types/database.ts; then
            echo "::error::database.ts is stale — run 'supabase gen types --local > app/src/types/database.ts' and commit the result"
            exit 1
          fi

  status:
    needs: [changes, check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          result="${{ needs.check.result }}"
          [[ "$result" == "failure" || "$result" == "cancelled" ]] && exit 1 || exit 0
